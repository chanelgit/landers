<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;

  body {

    background: linear-gradient(135deg, #0f2438 0%, #16324a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Progress Bar ---------- */
  .progress-wrap {
    padding: 20px 24px 0 24px;
    display: none;
  }

  .progress-track {
    width: 100%;
    height: 8px;
    background: #e7edf3;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2e7d32, #43a047);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .progress-label {
    text-align: right;
    font-size: 12px;
    color: #6b7c8d;
    margin-top: 6px;
    font-weight: 600;
  }

  /* ---------- Screens ---------- */
  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    justify-content: center;
    padding: 40px 32px;
    animation: fadeIn 0.45s ease;
  }

  .screen.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Intro Screen ---------- */
  .intro-icon {
    font-size: 46px;
    text-align: center;
    margin-bottom: 18px;
  }

  .intro h1 {
    font-size: 26px;
    color: #14263a;
    text-align: center;
    line-height: 1.35;
    margin-bottom: 14px;
    font-weight: 800;
  }

  .intro p {
    font-size: 15.5px;
    color: #56697c;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
  }

  .intro .subtext {
    background: #f4f8fb;
    border-left: 4px solid #2e7d32;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14px;
    color: #3a4b5c;
    margin-bottom: 28px;
  }

  .btn-start {
    background: linear-gradient(90deg, #2e7d32, #43a047);
    color: #fff;
    border: none;
    padding: 18px 24px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(46,125,50,0.35);
    transition: transform 0.15s ease;
  }

  .btn-start:hover {
    transform: translateY(-2px);
  }

  .trust-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 22px;
    font-size: 12px;
    color: #8a99a8;
  }

  /* ---------- Question Screens ---------- */
  .q-tag {
    font-size: 13px;
    font-weight: 700;
    color: #43a047;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .question h2 {
    font-size: 22px;
    color: #14263a;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 28px;
    font-weight: 800;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .option-btn {
    background: #f4f8fb;
    border: 2px solid #e2e9ef;
    color: #1e2f40;
    padding: 18px 20px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover {
    background: #eaf4ec;
    border-color: #43a047;
    transform: translateX(4px);
  }

  .option-btn.selected {
    background: #43a047;
    border-color: #43a047;
    color: #fff;
  }

  .option-emoji {
    font-size: 22px;
  }

  .loading {
    align-items: center;
    text-align: center;
  }

    border-top: 6px solid #43a047;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 26px auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
