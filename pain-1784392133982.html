=<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Score Trick Banks Don't Advertise</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f1729 0%, #1a2740 50%, #12203a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  .container {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    overflow: hidden;
    color: #1a1a2e;
    position: relative;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    width: 100%;
    height: 8px;
    background: #e8ecf3;
    display: none;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffb400, #ff7a00);
    transition: width 0.4s ease;
  }

  .screen {
    padding: 40px 30px 34px;
    display: none;
    animation: fadeIn 0.45s ease;
  }
  .screen.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* START SCREEN */
  #start-screen {
    display: block;
    text-align: center;
  }

  .badge {
    display: inline-block;
    background: #fff2df;
    color: #b25400;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  h1 {
    font-size: 26px;
    line-height: 1.3;
    color: #12203a;
    margin-bottom: 14px;
    font-weight: 800;
  }

  .subtext {
    font-size: 15px;
    color: #555b6e;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .highlight {
    color: #ff7a00;
    font-weight: 700;
  }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(90deg, #ff7a00, #ff9500);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,122,0,0.35);
    transition: transform 0.15s ease;
  }
  .start-btn:active {
    transform: scale(0.97);
  }

  .disclaimer {
    margin-top: 16px;
    font-size: 11.5px;
    color: #99a0b3;
  }

  /* QUESTION SCREENS */
  .q-number {
    font-size: 13px;
    color: #ff7a00;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .q-headline {
    font-size: 21px;
    font-weight: 800;
    color: #12203a;
    margin-bottom: 24px;
    line-height: 1.35;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    width: 100%;
    padding: 18px 20px;
    background: #f5f7fb;
    border: 2px solid #e8ecf3;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #1a1a2e;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .option-btn:hover {
    background: #fff2df;
    border-color: #ff9500;
    transform: translateX(2px);
  }

  .option-btn.selected {
    background: #ffe4c2;
    border-color: #ff7a00;
  }

  .option-btn .arrow {
    color: #ff7a00;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .option-btn:hover .arrow {
    opacity: 1;
  }

  /* LOADER SCREEN */
  #loading-screen {
    text-align: center;
    padding: 60px 30px;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 5px solid #f0f0f0;
    border-top: 5px solid #ff7a00;
    border-radius: 50%;
    margin: 0 auto 26px;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-title {
    font-size: 19px;
    font-weight: 800;
    color: #12203a;
    margin-bottom: 10px;
  }

  .loading-sub {
    font-size: 14px;
    color: #666d80;
    margin-bottom: 24px;
  }

  .fake-progress {
    width: 100%;
    height: 10px;
    background: #eef1f6;
    border-radius: 10px;
    overflow: hidden;
  }

  .fake-progress-bar {
    height: 100%;
    width: 0
