=<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>See What Your Credit Could Look Like in 60 Days</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: #ffffff;
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
    position: relative;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 8px;
    background: #e6ebef;
    display: none;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    transition: width 0.4s ease;
  }

  .screen {
    display: none;
    flex-direction: column;
    padding: 36px 30px;
    flex: 1;
    animation: fadeIn 0.4s ease;
  }

  .screen.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Start screen */
  #start-screen {
    align-items: center;
    text-align: center;
    justify-content: center;
    gap: 18px;
  }

  .badge {
    background: #eafaf1;
    color: #1e8449;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  #start-screen h1 {
    font-size: 26px;
    color: #17313a;
    line-height: 1.35;
    font-weight: 800;
  }

  #start-screen p {
    color: #55707a;
    font-size: 15.5px;
    line-height: 1.5;
    max-width: 380px;
  }

  .score-preview {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #f5f9fa;
    border-radius: 14px;
    padding: 16px 20px;
    width: 100%;
    max-width: 360px;
  }

  .score-box {
    text-align: center;
  }

  .score-box .num {
    font-size: 22px;
    font-weight: 800;
  }

  .score-box.before .num { color: #c0392b; }
  .score-box.after .num { color: #1e8449; }

  .score-box .lbl {
    font-size: 11px;
    color: #7f939a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .arrow {
    font-size: 20px;
    color: #b6c4c9;
  }

  .start-btn {
    margin-top: 8px;
    background: linear-gradient(90deg, #27ae60, #1e8449);
    color: white;
    border: none;
    padding: 18px 40px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(30,132,73,0.35);
    transition: transform 0.15s ease;
    width: 100%;
    max-width: 320px;
  }

  .start-btn:hover {
    transform: translateY(-2px);
  }

  .disclaimer {
    font-size: 11.5px;
    color: #9aa9ae;
    margin-top: 6px;
  }

  /* Question screens */
  .q-header {
    font-size: 12px;
    color: #27ae60;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .q-title {
    font-size: 22px;
    font-weight: 800;
    color: #17313a;
    margin-bottom: 26px;
    line-height: 1.35;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .option-btn {
    background: #f5f9fa;
    border: 2px solid #e6ebef;
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 600;
    color: #24424b;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn .emoji {
    font-size: 22px;
  }

  .option-btn:hover {
    border-color: #27ae60;
    background: #eafaf1;
    transform: translateX(3px);
  }

  .option-btn.selected {
    border-color: #1e8449;
    background: #d9f2e2;
  }

  /* Loading screen */
  #loading-screen {
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #e6ebef;
    border-top: 6px solid #27ae60;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
